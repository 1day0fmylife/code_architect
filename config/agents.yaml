project:
  name: hermes-opencode-team
  default_branch: main
  workspace: /workspace

llm:
  default_backend: ${DEFAULT_LLM_BACKEND:-ollama}
  default_model: ${DEFAULT_MODEL:-qwen2.5-coder:7b}
  backends:
    ollama:
      base_url: ${OLLAMA_BASE_URL:-http://ollama:11434}
      openai_base_url: ${OLLAMA_BASE_URL:-http://ollama:11434}/v1
    llamacpp:
      openai_base_url: ${LLAMACPP_BASE_URL:-http://llamacpp:8080/v1}

memory:
  summarize_after_messages: 20
  retrieve_top_k: 8
  write_events: true

code_engines:
  default: ${CODE_ENGINE:-opencode}
  opencode:
    bin: ${OPENCODE_BIN:-opencode}
    timeout_sec: 1800
  codex:
    bin: ${CODEX_BIN:-codex}
    timeout_sec: 1800

agents:
  architect:
    title: Architect Agent
    model: ${DEFAULT_MODEL:-qwen2.5-coder:7b}
    mission: >
      Analyze requirements, split work, design module boundaries, produce implementation plan,
      architecture decision records, and task list for other agents.
  backend:
    title: Backend Agent
    model: ${DEFAULT_MODEL:-qwen2.5-coder:7b}
    mission: >
      Implement backend code, APIs, DB migrations, services, tests, and integration points.
  frontend:
    title: Frontend Agent
    model: ${DEFAULT_MODEL:-qwen2.5-coder:7b}
    mission: >
      Implement UI, client-side state, API clients, forms, validation, and UX fixes.
  security:
    title: Security Agent
    model: ${DEFAULT_MODEL:-qwen2.5-coder:7b}
    mission: >
      Review threat model, secrets, auth, RBAC, input validation, dependency risk,
      container hardening, and supply-chain issues.
  qa:
    title: QA Agent
    model: ${DEFAULT_MODEL:-qwen2.5-coder:7b}
    mission: >
      Build and run test strategy, unit/integration/e2e tests, acceptance checks,
      regression notes, and quality gates.

workflow:
  default_sequence:
    - architect
    - backend
    - frontend
    - security
    - qa
